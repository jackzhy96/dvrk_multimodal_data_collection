# Data Remapping Configuration
# Used to re-sequence already organized data based on a mapping configuration

workspace: "<repository root>"

# Input folder: organized data with sequential numbered folders
# This should be the output from data_reorg.py (e.g., raw_data)
input_folder: "<input data folder>"

# Output folder: where remapped data will be copied
# Create one if it doesn't exist
output_folder: "<output folder>"

# Remap configuration file: JSON file defining the mapping
# Format: {"<input_idx>": <output_idx>, ...}
# Example: {"0": 5, "1": 3, "2": 0} means:
#   - Copy input/0 to output/5
#   - Copy input/1 to output/3
#   - Copy input/2 to output/0
remap_config: "${workspace}/tests/remap_data_note.json"

# Optional: Hydra log output configuration
# hydra:
#   run:
#     dir: "${workspace}/outputs/logs/${now:%Y%m%d}_${now:%H%M%S}"
