# Top-level Hydra config for `surgsync build`.
#
# Loads sub-configs (encode, align, path_config) and lets the operator
# override individual fields from the CLI:
#
#     python -m dvrk_data_processing.surgsync.cli build \
#         path_config=jack_local \
#         clips.source=dataset clips.dataset_name=online_data \
#         release_option=B

defaults:
  - path_config: jack_local
  - encode: h264_ffv1
  - align: offline
  - _self_

# Dataset-level metadata
data_version: "1.0"
release_option: "B"   # "A" | "B" | "C"

# Clip selection — pick how to discover the clips to pack.
clips:
  source: "all"           # "all" | "list" | "dataset"
  list: []
  dataset_name: ""

# Per-clip task labels. meta_data.json does not carry a `task` field,
# so we either infer per clip from `annotation/phase/<frame>.json`
# (`default_task: "auto"`) or use an explicit fallback. Per-clip
# `tasks.overrides` always wins.
#
# Auto-inference reads each clip's phase annotation, takes the mode
# phase, then maps phase → task via
# `workflow_description.json:_task_routing`. The dataset's folder name
# is the resolved task — so a phase-2 clip lands under
# `<root>/<dataset>/episodes/cold_cut_dissection/<idx>/` etc.
tasks:
  default_task: "auto"
  overrides: {}
  # Example override block — keys are <dataset>/<clip_idx>, values
  # are task names from `workflow_description.json:_task_routing`
  # (single_interrupted_stitch / cold_cut_dissection / peg_transfer /
  # tissue_manipulation / cold_cut_dissection_intestine / cold_cut_dissection_skin_peel):
  # overrides:
  #   online_data/2: "single_interrupted_stitch"
  #   offline_data/3: "tissue_manipulation"
  #
  # NOTE: `meta/tasks.jsonl` is auto-generated by every build from
  # `workflow_description/workflow_description.json`. There's no
  # `vocab_jsonl_source` knob anymore — edit the workflow JSON to
  # change the vocab.

# Build behavior
force: false
clean_staging: false
parallelism: 1
log_dir: ""
fps: 10.0   # dVRK capture rate

# Output ingredient subsets
include_video_processed: true
include_video_raw: true        # MANDATORY for decomposability (packer invertibility contract)
include_preprocess: true
include_preview: false
