# Strict alignment tolerances for the online recorder.
# Strict policy — 2 ms across the board.

tol_ms_image_right_online: 2.0
tol_ms_image_side_online: 33.0
tol_ms_kinematic_online: 100.0   # see surgsync/config.py for the rationale

# Offline values still set, used when a mixed release packs both variants.
tol_ms_image_right_offline: 2.0
tol_ms_image_side_offline: 33.0
tol_ms_kinematic_offline: 100.0

contiguity_period_multiplier: 1.5
