# Label Conversion Configuration
# Used to convert annotation label names from old format to new format
# - event -> step (folder name and JSON key)
# - phase -> gesture (folder name and JSON key)
# - contact_detection -> no change (copy as-is)

workspace: "<repository root>"

# Input folder: contains subfolders with old annotation format
# Expected structure: <input_folder>/<int_number>/annotation/{contact_detection, event, phase}
input_folder: "<label data folder>"

# Output folder: will contain subfolders with new annotation format
# Output structure: <output_folder>/<int_number>/annotation/{contact_detection, step, gesture}
output_folder: "<output folder>"
