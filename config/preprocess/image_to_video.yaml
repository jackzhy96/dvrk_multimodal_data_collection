stage: image_to_video
folder_initialize: false

enable_fixed_rate: true
video_fixed_rate: 10

### Frame range selection (-1 means use all frames)
start_frame: -1  # -1 means start from first frame (0)
end_frame: -1    # -1 means process until last frame

### 2025-08-28 suturing1 7
#start_frame: 65  # -1 means start from first frame (0)
#end_frame: 729    # -1 means process until last frame

resize_config:
  enable_resize: false
#  enable_resize: true
  new_size: [512, 288]

### FFmpeg encoding settings (used when FFmpeg is available; OpenCV fallback otherwise)
ffmpeg_config:
  codec: "libx264"       # FFmpeg codec (libx264, libx265, etc.)
  crf: 17                # Constant Rate Factor (0-51, lower = better quality)
  preset: "slow"         # Encoding preset (ultrafast/fast/medium/slow/veryslow)
  pixel_format: "yuv420p"  # Pixel format for broad playback compatibility