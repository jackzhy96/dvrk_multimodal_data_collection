# UBC variant of the kinematic_reproject preprocess config.
# Mirrors kinematic_reproject.yaml but with UBC-specific image_size and arm_name.
stage: kinematic_reproject
folder_initialize: false

# custom configurations
img_size: [640, 480]
arm_name: ['PSM1', 'PSM3']

input_folder: '${path_config.intermediate_dir}/regular'
output_folder: "${path_config.processed_dir}/${.stage}"

weight_config:
  sigma_x: 60
  sigma_y: 60
  advanced_weight: true
  tol_dist: 0.05

# Per-PSM weight overrides. If null/omitted, falls back to weight_config above.
# Each entry follows the same format as weight_config (sigma_x, sigma_y, advanced_weight, tol_dist).
weight_config_PSM1:
weight_config_PSM2:
weight_config_PSM3:

enable_overlay: true

# UBC datasets don't have hand-eye calibration files committed, so the
# calibrated_kinematic / drawframe features are off by default here. Flip
# both to `true` once the relevant calibration is in place.
calibrated_kinematic:
  enable: false

drawframe:
  enable: false
  axis_length_m: 0.010
  line_thickness_px: 2
  origin_marker_radius_px: 3
  colors_bgr:
    x: [0, 0, 255]
    y: [0, 255, 0]
    z: [255, 0, 0]
  cameras: [left, right]
