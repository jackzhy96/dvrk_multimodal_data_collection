stage: kinematic_map
folder_initialize: false

# custom configurations
img_size: [640, 480]
arm_name: ['PSM1', 'PSM3']

input_folder: '${path_config.intermediate_dir}/regular'
output_folder: "${path_config.processed_dir}/${.stage}"

weight_config:
  sigma_x: 60
  sigma_y: 60
  advanced_weight: true
  tol_dist: 0.05

# Per-PSM weight overrides. If null/omitted, falls back to weight_config above.
# Each entry follows the same format as weight_config (sigma_x, sigma_y, advanced_weight, tol_dist).
weight_config_PSM1:
weight_config_PSM2:
weight_config_PSM3:

enable_overlay: true
